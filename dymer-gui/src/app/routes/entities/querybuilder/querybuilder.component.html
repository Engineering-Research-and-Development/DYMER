
<!-- Query Builder Card -->
<mat-card class="mt-3">
  <mat-card-header>
    <mat-card-title class="text-warning">
      {{ 'menu.query_builder.title.sql' | translate }}
      <mat-icon>gamepad</mat-icon>
      {{ 'menu.query_builder.title.entity_search' | translate }}
    </mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <div id="builder" class="col-md-12"></div>
    <div class="text-right mt-3">
      <button mat-raised-button color="primary" id="btn-get">
        <mat-icon>get_app</mat-icon> {{ 'menu.query_builder.buttons.get_rules' | translate }}
      </button>
      <button mat-raised-button color="accent" id="btn-test" class="ml-2">
        <mat-icon>table_chart</mat-icon> {{ 'menu.query_builder.buttons.test_rules' | translate }}
      </button>
      <button mat-raised-button color="warn" id="btn-reset" class="ml-2">
        <mat-icon>delete</mat-icon> {{ 'menu.query_builder.buttons.reset' | translate }}
      </button>
    </div>
    <br>
    <div id="queryResult"></div>
    <div id="renderqueryResult"></div>
  </mat-card-content>
</mat-card>
