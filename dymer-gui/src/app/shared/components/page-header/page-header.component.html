<header class="flex items-center justify-between px-8 py-6 bg-white dark:bg-zinc-950 border-b border-zinc-100 dark:border-zinc-900 mb-6">
  
  <div class="flex items-center gap-4">
    <div class="hidden sm:flex w-10 h-10 items-center justify-center rounded-xl bg-zinc-50 dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-zinc-500"><path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>
    </div>

    <div class="space-y-0.5">
      <div class="flex items-center gap-2">
        <span class="text-[10px] font-bold text-zinc-400 uppercase tracking-[0.2em]">{{ subtitle | translate }}</span>
        <span class="text-zinc-300 dark:text-zinc-700">/</span>
        <span class="text-[10px] font-bold text-zinc-900 dark:text-zinc-100 uppercase tracking-[0.2em]">New</span>
      </div>
      <h1 class="text-lg font-bold tracking-tight text-zinc-900 dark:text-zinc-50 leading-none">
        {{ title | translate }}
      </h1>
    </div>
  </div>

 
</header>
