<div class="card stats-card">
  <div class="card-body d-flex justify-content-between align-items-center">
    
    <!-- Testo -->
    <div>
      <h3 class="card-value mb-1">  {{ value }}</h3>
      <p class="card-label mb-3">{{ label }}</p>

    </div>

    <!-- Icona -->
    <div class="icon-box" [ngStyle]="iconStyle">
       
       <i [ngClass]="icon"></i>
    </div>

  </div>
  <div class="progress" style="height: 6px;">
        <div class="progress-bar bg-secondary" style="width: 80%;"></div>
      </div>
  <div class="mt-4 w-full bg-slate-200 rounded-full h-1 overflow-hidden">
    <div class="h-full bg-linear-to-r from-purple-500 to-purple-600 rounded-full transform -translate-x-full group-hover:translate-x-0 transition-transform duration-1000 ease-out"></div>
  </div>
</div>
